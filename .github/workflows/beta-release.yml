name: beta-release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.4.1"

jobs:
  publish-beta:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Resolve publish diff range
        id: diff-range
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          HEAD_SHA="${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}"
          BASE_SHA=""

          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            CHECK_SUITE_ID="${{ github.event.workflow_run.check_suite_id }}"
            if [[ -n "$CHECK_SUITE_ID" && "$CHECK_SUITE_ID" != "null" ]]; then
              BASE_SHA="$(gh api "repos/${{ github.repository }}/check-suites/${CHECK_SUITE_ID}" --jq '.before // empty' || true)"
            fi
          fi

          if [[ -z "$BASE_SHA" ]]; then
            BASE_SHA="$(git rev-parse "${HEAD_SHA}^" 2>/dev/null || true)"
          fi

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "resolved_base_sha=$BASE_SHA"
          echo "resolved_head_sha=$HEAD_SHA"

      - name: Decide whether beta publish is needed
        id: publish-check
        shell: bash
        run: |
          bash scripts/ci/should-publish.sh "${{ steps.diff-range.outputs.base_sha }}" "${{ steps.diff-range.outputs.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Publish decision
        run: |
          echo "should_publish=${{ steps.publish-check.outputs.should_publish }}"
          echo "reason=${{ steps.publish-check.outputs.reason }}"

      - name: Setup pnpm
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Ensure npm version for trusted publishing
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: npm install -g npm@latest

      - name: Install dependencies
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: pnpm build

      - name: Set beta version
        id: beta-version
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        shell: bash
        run: |
          CURRENT_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")
          BASE_VERSION="${CURRENT_VERSION%%-*}"
          BETA_VERSION="${BASE_VERSION}-beta.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          npm version "$BETA_VERSION" --no-git-tag-version
          echo "version=$BETA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish beta to npm
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: npm publish --tag beta --access public

      - name: Point latest to published beta
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_LATEST="$(npm view @ayme-dev/test dist-tags.latest)"
          echo "current_latest=$CURRENT_LATEST"

          # During beta-only phase, `latest` is a prerelease and we keep it fresh.
          # After a stable release (non-prerelease) owns `latest`, do not override it from beta publishes.
          if [[ -z "$CURRENT_LATEST" || "$CURRENT_LATEST" == *-* ]]; then
            npm dist-tag add "@ayme-dev/test@${{ steps.beta-version.outputs.version }}" latest
          else
            echo "latest points to stable ($CURRENT_LATEST); leaving unchanged"
          fi
