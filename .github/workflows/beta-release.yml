name: beta-release

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.4.1"

jobs:
  publish-beta:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Decide whether beta publish is needed
        id: publish-check
        shell: bash
        run: |
          bash scripts/ci/should-publish.sh >> "$GITHUB_OUTPUT"

      - name: Publish decision
        run: |
          echo "should_publish=${{ steps.publish-check.outputs.should_publish }}"
          echo "reason=${{ steps.publish-check.outputs.reason }}"

      - name: Setup pnpm
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Ensure npm version for trusted publishing
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: npm install -g npm@latest

      - name: Install dependencies
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: pnpm install --frozen-lockfile

      - name: Build package
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: pnpm build

      - name: Set beta version
        id: beta-version
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        shell: bash
        run: |
          CURRENT_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")
          BASE_VERSION="${CURRENT_VERSION%%-*}"
          BETA_VERSION="${BASE_VERSION}-beta.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          npm version "$BETA_VERSION" --no-git-tag-version
          echo "version=$BETA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish beta to npm
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: npm publish --tag beta --access public

      - name: Point latest to published beta
        if: ${{ steps.publish-check.outputs.should_publish == 'true' }}
        run: npm dist-tag add "@ayme-dev/test@${{ steps.beta-version.outputs.version }}" latest
